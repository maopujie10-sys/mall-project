# ============================================================
# TikTokMall 统一入口 Nginx
# /ai/     → AI Agent 控制台 (Vue)
# /ai/api/ → AI Agent 后台 API (FastAPI :9000)
# /api/    → 商城后台 API (Java :8080)
# /        → 商城前端 (Vue)
# ============================================================

# 速率限制
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    listen 443 ssl;
    server_name _;

    # SSL 证书（若存在则使用，否则使用自签名）
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100m;
    limit_conn conn_limit 50;

    # 安全头
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ===== AI 控制台前端 =====
    location /ai/ {
        proxy_pass http://ai-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== AI Agent 后台 API =====
    location /ai/api/ {
        proxy_pass http://ai-agent:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        limit_req zone=ai_limit burst=20 nodelay;

        # WebSocket 升级支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ===== 商城后台 API (Java) =====
    location /api/ {
        proxy_pass http://mall-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        limit_req zone=api_limit burst=30 nodelay;
    }

    # ===== 商城 PC 前端 =====
    location / {
        root /usr/share/nginx/html/mall;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ===== 商城 H5 前端 =====
    location /h5/ {
        alias /usr/share/nginx/html/mall-h5/;
        index index.html;
        try_files $uri $uri/ /h5/index.html;
    }

    # ===== 健康检查 =====
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

