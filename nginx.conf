# ============================================================
# TikTokMall 统一入口 Nginx
# /ai/     → AI Agent 控制台 (Vue)
# /ai/api/ → AI Agent 后台 API (FastAPI :9000)
# /api/    → 商城后台 API (Java :8080)
# /        → 商城前端 (Vue)
# ============================================================

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # ===== AI 控制台前端 =====
    location /ai/ {
        proxy_pass http://ai-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== AI Agent 后台 API =====
    location /ai/api/ {
        proxy_pass http://ai-agent:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ===== 商城后台 API (Java) =====
    location /api/ {
        proxy_pass http://mall-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ===== 商城 PC 前端 =====
    location / {
        root /usr/share/nginx/html/mall;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ===== 商城 H5 前端 =====
    location /h5/ {
        alias /usr/share/nginx/html/mall-h5/;
        index index.html;
        try_files $uri $uri/ /h5/index.html;
    }

    # ===== 健康检查 =====
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

