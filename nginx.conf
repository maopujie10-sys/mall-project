# ============================================================
# TikTokMall 统一入口 Nginx (v3.0 — mall-unified 统一前端)
#
# /         → 统一前端 (落地页/PC商城/手机商城/商家后台)
# /api/     → 商城 Java API (:8080)
# /ai/      → AI 控制台前端
# /ai/api/  → AI Agent API (:9000)
# ============================================================

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;

    # ===== 统一前端 =====
    location / {
        proxy_pass http://mall-unified:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== 商城 Java API =====
    location /api/ {
        proxy_pass http://mall-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ===== 商家 API (Java) =====
    location /merchant/ {
        proxy_pass http://mall-api:8080/merchant/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== 管理员 API (Java) =====
    location /admin/ {
        proxy_pass http://mall-api:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== AI 控制台前端 =====
    location /ai/ {
        proxy_pass http://mall-ai-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===== AI Agent 后台 API =====
    location /ai/api/ {
        proxy_pass http://mall-ai-agent:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # ===== 健康检查 =====
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
