version: "3.8"

# ============================================================
# TikTokMall 统一编排 (v3.0 — mall-unified 统一前端)
# 一键启动：MySQL + Redis + AI Agent + 商城API + 统一前端 + Nginx
# ============================================================

services:
  # ========== 基础设施 ==========

  mysql:
    image: mysql:8.0
    container_name: mall-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: mall_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mall-app/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-mall.sql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ========== AI Agent 后台 ==========

  ai-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mall-ai-agent
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=ai_agent
      - MALL_DB_HOST=mysql
      - MALL_DB_PORT=3306
      - MALL_DB_USER=root
      - MALL_DB_PASSWORD=${DB_PASSWORD}
      - MALL_DB_NAME=mall_db
      - REDIS_DSN=redis://redis:6379/0
      - MALL_BASE_URL=http://mall-api:8080
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ========== AI 控制台前端 ==========

  ai-frontend:
    build: ./frontend
    container_name: mall-ai-frontend
    restart: unless-stopped
    depends_on:
      - ai-agent

  # ========== 商城 API (Java Spring) ==========

  mall-api:
    build:
      context: ./mall-app
      dockerfile: Dockerfile
    container_name: mall-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mall_db?useUnicode=true&characterEncoding=utf8mb4&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ========== 统一商城前端 (PC/H5/商家) ==========

  mall-unified:
    build:
      context: ./mall-unified
      dockerfile: Dockerfile
    container_name: mall-unified
    restart: unless-stopped
    depends_on:
      - mall-api

  # ========== 统一入口 Nginx ==========

  nginx:
    image: nginx:alpine
    container_name: mall-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - mall-unified
      - mall-api
      - ai-frontend

volumes:
  mysql_data:
  redis_data:
