version: "3.8"

# ============================================================
# TikTokMall AI Agent + �̳� ͳһ����
# һ���������ȫ������AI ȫȨ��ά�̳�
# ============================================================

services:
  # ========== ������ʩ ==========

  mysql:
    image: mysql:8.0
    container_name: mall-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mall123456}
      MYSQL_DATABASE: mall_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mall-app/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-mall.sql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mall-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # ========== AI Agent ��̨ ==========

  ai-agent:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mall-ai-agent
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-mall123456}
      - DB_NAME=ai_agent
      - MALL_DB_HOST=mysql
      - MALL_DB_PORT=3306
      - MALL_DB_USER=root
      - MALL_DB_PASSWORD=${MYSQL_ROOT_PASSWORD:-mall123456}
      - MALL_DB_NAME=mall_db
      - REDIS_DSN=redis://redis:6379/0
      - MALL_BASE_URL=http://mall-api:8080
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ========== AI ǰ�˿���̨ ==========

  ai-frontend:
    build: ./frontend
    container_name: mall-ai-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - ai-agent

  # ========== �̳� API (Java Spring) ==========

  mall-api:
    build:
      context: ./mall-app
      dockerfile: Dockerfile
    container_name: mall-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/mall_db?useUnicode=true&characterEncoding=utf8mb4
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-mall123456}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ========== ͳһ��� Nginx ==========

  nginx:
    image: nginx:alpine
    container_name: mall-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./mall-frontend-pc/dist:/usr/share/nginx/html/mall
      - ./mall-frontend-h5/dist:/usr/share/nginx/html/mall-h5
    restart: unless-stopped
    depends_on:
      - ai-frontend
      - mall-api

volumes:
  mysql_data:
  redis_data:


