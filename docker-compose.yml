version: "3.8"

services:
  agent:
    build: ./backend
    container_name: mall-agent
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-development}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./backups:/app/backups
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: mall-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mall-agent-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - agent

volumes:
  redis_data:
