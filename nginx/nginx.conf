worker_processes auto;
events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    gzip on;

    # 登录接口限流：同IP每分钟最多5次
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    upstream mall_app { server mall-app:8080; }
    upstream mall_agent { server mall-agent:9000; }

    # ---- HTTP → HTTPS 重定向 ----
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---- HTTPS 主站 ----
    server {
        listen 443 ssl http2;
        server_name tiktook.eu.cc www.tiktook.eu.cc *.tiktook.eu.cc
                    chxhx.eu.cc www.chxhx.eu.cc *.chxhx.eu.cc
                    drrgr.eu.cc www.drrgr.eu.cc *.drrgr.eu.cc
                    drrimrf.eu.cc www.drrimrf.eu.cc *.drrimrf.eu.cc
                    drriiu.eu.cc www.drriiu.eu.cc *.drriiu.eu.cc
                    duomi.eu.cc www.duomi.eu.cc *.duomi.eu.cc
                    gamed.eu.cc www.gamed.eu.cc *.gamed.eu.cc
                    yyawzx.eu.cc www.yyawzx.eu.cc *.yyawzx.eu.cc
                    dengruihan.eu.cc www.dengruihan.eu.cc *.dengruihan.eu.cc;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # 安全响应头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 统一前端根目录
        root /frontends;

        # ---- 登录接口限流 ----
        location = /api/user/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://mall_app/api/user/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /admin/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://mall_app/admin/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location = /merchant/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://mall_app/merchant/login;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- 后端 API 代理 ----
        location /api/ {
            proxy_pass http://mall_app/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /agent/ {
            proxy_pass http://mall_app/agent/;
            proxy_set_header Host $host;
            proxy_set_header X-Agent-Token $http_x_agent_token;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- AI 总后台 API ----
        location /ai/api/ {
            proxy_pass http://mall_agent/;
            proxy_set_header Host $host;
            proxy_set_header X-Agent-Token $http_x_agent_token;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /ai/docs {
            proxy_pass http://mall_agent/docs;
            proxy_set_header Host $host;
        }
        location /ai/openapi.json {
            proxy_pass http://mall_agent/openapi.json;
            proxy_set_header Host $host;
        }

        # ---- AI 总后台 前端 (SPA) ----
        location /ai/ {
            try_files $uri $uri/ /ai/index.html;
        }

        # ---- 落地页 (首页) ----
        location = /brand-tokens.css {
            root /frontends/merchant;
        }
        location = / {
            root /frontends/landing;
            try_files /index.html =404;
        }

        # ---- 商城入口 /mall/ ----
        location /mall/wap/ {
            try_files $uri $uri/ /wap/index.html;
        }
        location /mall/ {
            try_files $uri $uri/ /index.html;
        }

        # ---- SPA兜底 (资产文件 + 旧路径兼容) ----
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---- 手机H5 用户商城 ----
        location /wap/ {
            try_files $uri $uri/ /wap/index.html;
        }

        # ---- 商家端 API (静态优先→API→SPA兜底) ----
        location /merchant/ {
            try_files $uri $uri/ @merchant_api;
        }
        location @merchant_api {
            proxy_pass http://mall_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 404 = @merchant_spa;
        }
        location @merchant_spa {
            rewrite ^ /merchant/index.html break;
        }

        # ---- PC商家 后台 (API优先, 无匹配回SPA) ----
        location /admin/ {
            try_files $uri $uri/ @admin_api;
        }
        location @admin_api {
            proxy_pass http://mall_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 404 = @admin_spa;
        }
        location @admin_spa {
            rewrite ^ /admin/index.html break;
        }

        # ---- 招商入驻 ----
        location /promote/ {
            try_files $uri $uri/ /promote/index.html;
        }
        location /invite/ {
            try_files $uri $uri/ /promote/index.html;
        }

        # ---- 手机商家H5 ----
        location /www/ {
            try_files $uri $uri/ /www/index.html;
        }
        location /m-merchant {
            return 301 /www/;
        }

        # ---- 前端预览（开发调试用） ----
        location /preview/ {
            proxy_pass http://172.19.0.1:5173/preview/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
