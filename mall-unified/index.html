<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TikTokMall" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>TikTokMall 跨境商城</title>
  <script>
    // 注册 PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {})
      })
    }
    // 设备检测：PC 访问 /m 自动感知
    (function() {
      var path = window.location.pathname
      var isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent)
      // 手机访问 PC（非 /m 开头）→ 自动跳手机版
      if (isMobile && !path.startsWith('/m') && path !== '/' && path !== '/manifest.json') {
        // 不强制，让用户自己选，但保存偏好
      }
    })()
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
