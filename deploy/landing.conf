# ===== 主域名 → 落地页 =====
server {
    listen 80;
    server_name tiktook.eu.cc www.tiktook.eu.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tiktook.eu.cc www.tiktook.eu.cc;

    ssl_certificate     /etc/letsencrypt/live/www.tiktook.eu.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.tiktook.eu.cc/privkey.pem;
    ssl_protocols TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Lottery API — 后端未部署，返回空数据避免 404
    location = /api/activity/lottery!getCurrentActivity.action {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"code":"0","data":{}}';
    }
    location = /wap/api/activity/lottery!getCurrentActivity.action {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        return 200 '{"code":"0","data":{}}';
    }

    # promote/level REST→Action 兼容
    location = /api/promote/level {
        proxy_pass http://127.0.0.1:8080/api/api/promote!team_level.action;
    }

    # 落地页轮值 API → AI 后端
    location /api/rotation/ {
        proxy_pass http://127.0.0.1:9000/rotation/;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
    }

    # Telegram Bot Webhook → AI 后端
    location /api/gateway/ {
        proxy_pass http://127.0.0.1:9000/api/gateway/;
        proxy_http_version 1.1;
        add_header Access-Control-Allow-Origin *;
    }

    # 落地页路由跳转 /api/r?flag=xxx
    location = /api/r {
        if ($arg_flag = "pc")  { return 302 /pc/; }
        if ($arg_flag = "spc") { return 302 /seller/; }
        if ($arg_flag = "ldy") { return 302 /promote/; }
        return 302 /;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/api/;
    }

    location /data/ {
        proxy_pass http://127.0.0.1:8080/data/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8080/admin/;
    }

    # 视频防盗链
    location ~* \.(mp4|mov|avi|mkv|flv|wmv)$ {
        valid_referers none blocked server_names ~\.eu\.cc$;
        if ($invalid_referer) { return 403; }
        limit_rate_after 512k;
        limit_rate 128k;
        proxy_pass http://127.0.0.1:8080;
    }

    # WAP action URL → api.war
    location ~ ^/wap/(api|seller|goods|evaluation|order|user|syspara|category|banner|address|keepGoods|localuser|channelBlockchain|jscode|idcode|newOnlinechat|uploadimg|subscribe|credit|index|focusSeller|public|thirdPartyRecharge|malllevel|kyc|sysParaSign|sysParaProduct|rechargeBlockchain|withdraw|wallet|orderLog|sellerGoods|moneylog)/([^/]+!.*\.action)$ {
        proxy_pass http://127.0.0.1:8080/api/$1/$2$is_args$args;
    }
    # Seller action URL → api.war
    location ~ ^/seller/([^/]+!.*\.action)$ {
        proxy_pass http://127.0.0.1:8080/api/seller/$1$is_args$args;
    }

    # 预览
    location /pc-preview-tiktok/ {
        proxy_pass http://127.0.0.1:8080/pc-preview-tiktok/;
    }
    location /pc-preview-wholesale/ {
        proxy_pass http://127.0.0.1:8080/pc-preview-wholesale/;
    }

    # 静态素材
    location /static/ {
        root /opt/tomcat8/webapps;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA 静态直读 + try_files 兜底
    location /pc/ {
        root /opt/tomcat8/webapps;
        try_files $uri $uri/ /pc/index.html;
    }
    location /wap/ {
        root /opt/tomcat8/webapps;
        try_files $uri $uri/ /wap/index.html;
    }
    location /seller/ {
        root /opt/tomcat8/webapps;
        try_files $uri $uri/ /seller/index.html;
    }
    location /www/ {
        root /opt/tomcat8/webapps;
        try_files $uri $uri/ /www/index.html;
    }

    # 卖家登录跳转分流
    location = /ww {
        if ($http_user_agent ~* "(nokia|iphone|android|motorola|^mot-|softbank|foma|docomo|kddi|up\.browser|up\.link|htc|dopod|blazer|netfront|helio|hosin|huawei|novarra|CoolPad|webos|techfaith|palmsource|blackberry|alcatel|amoi|ktouch|nexian|samsung|^sam-|s[cg]h|^lge|ericsson|philips|sagem|wellcom|bunjalloo|maui|symbian|smartphone|midp|wap|phone|windows ce|iemobile|^spice|^bird|^zte-|longcos|pantech|gionee|^sie-|portalmmm|jigs\sbrowser|hiptop|^benq|haier|^lct|operas*mobi|opera*mini|320x320|240x320|176x220)") {
            return 302 /www/;
        }
        return 302 /seller/;
    }

    # AI 管理面板
    location /ai/api/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location /ai/ {
        proxy_pass http://127.0.0.1:5173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # /agent/ → /chat/agent/ 路径重写（FloatingAI fetch 调用）
    # conversations 无 /chat/ 前缀
    location /agent/chat/conversations {
        proxy_pass http://127.0.0.1:9000/chat/agent/conversations;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
    # chat/stream compare history 有 /chat/ 前缀
    location /agent/chat/ {
        proxy_pass http://127.0.0.1:9000/chat/agent/chat/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
    # 其他 /agent/ 路径
    location /agent/ {
        proxy_pass http://127.0.0.1:9000/chat/agent/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    # 落地页 — TK Global Mall 品牌展示
    location = / {
        root /opt/tomcat8/webapps/ROOT;
        try_files /index.html =404;
    }

    location = /favicon.ico {
        root /opt/tomcat8/webapps/ROOT;
        try_files /assets/logo.png =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8080/;
    }
}

