<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#1989fa" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="TikTokMall" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').then(r => console.log('[TikTokMall PWA] OK:', r.scope))
      })
    }
  </script>
  <title>TikTokMall 商城</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system,"Helvetica Neue",sans-serif; background: #f7f8fa; }
    #pwaApp { display: none; flex-direction: column; height: 100%; }
    #pwaApp.active { display: flex; }
    iframe { flex: 1; border: none; width: 100%; background: #fff; }
    .tabbar { display: flex; background: #fff; border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; z-index: 999; user-select: none; -webkit-user-select: none; }
    .tabbar-item { flex: 1; text-align: center; padding: 6px 0 4px; color: #999; font-size: 10px; cursor: pointer; transition: color .2s; -webkit-tap-highlight-color: transparent; }
    .tabbar-item.active { color: #1989fa; }
    .tabbar-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }
    .tabbar-item .label { font-size: 11px; }
    .profile-page { flex: 1; overflow-y: auto; padding: 20px 16px; display: none; background: #f7f8fa; }
    .profile-page.active { display: block; }
    .user-card { background: linear-gradient(135deg,#1989fa,#07c160); border-radius: 12px; padding: 24px 16px; color: white; margin-bottom: 16px; }
    .user-card .name { font-size: 20px; font-weight: 600; }
    .user-card .role { font-size: 13px; opacity: .8; margin-top: 4px; }
    .menu-list { background: #fff; border-radius: 12px; overflow: hidden; }
    .menu-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #f5f5f5; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .menu-item:last-child { border: none; }
    .menu-item .menu-icon { font-size: 18px; margin-right: 12px; width: 28px; text-align: center; }
    .menu-item .menu-text { flex: 1; font-size: 14px; color: #333; }
    .menu-item .menu-arrow { color: #ccc; font-size: 16px; }
    .btn { display: block; width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 15px; cursor: pointer; margin-top: 12px; }
    .btn-primary { background: #1989fa; color: white; }
    .btn-default { background: #fff; color: #333; border: 1px solid #ddd; }
  </style>
</head>
<body>

<!-- ===== PWA 模式：带底部Tab栏的统一壳 ===== -->
<div id="pwaApp">
  <iframe id="appFrame" src="/wap/"></iframe>

  <!-- 个人中心页 -->
  <div id="profilePage" class="profile-page">
    <div class="user-card">
      <div class="name" id="displayName">游客</div>
      <div class="role" id="displayRole">普通用户</div>
    </div>
    <div class="menu-list">
      <div class="menu-item" data-url="/wap/"><span class="menu-icon">🛍️</span><span class="menu-text">逛商城</span><span class="menu-arrow">›</span></div>
      <div class="menu-item" data-url="/www/"><span class="menu-icon">🏪</span><span class="menu-text">商家管理</span><span class="menu-arrow">›</span></div>
      <div class="menu-item" data-url="/profile/login"><span class="menu-icon">🔑</span><span class="menu-text">登录</span><span class="menu-arrow">›</span></div>
      <div class="menu-item" data-url="/profile/register"><span class="menu-icon">📝</span><span class="menu-text">注册</span><span class="menu-arrow">›</span></div>
      <div class="menu-item" data-url="/profile/merchant-apply"><span class="menu-icon">📋</span><span class="menu-text">申请入驻</span><span class="menu-arrow">›</span></div>
    </div>
    <button class="btn btn-default" onclick="clearCache()">🗑️ 清除本地缓存</button>
  </div>

  <!-- 底部导航栏 -->
  <div class="tabbar" id="tabbar">
    <div class="tabbar-item active" data-tab="shop" onclick="switchTab('shop')">
      <span class="icon">🏠</span><span class="label">商城</span>
    </div>
    <div class="tabbar-item" data-tab="merchant" onclick="switchTab('merchant')">
      <span class="icon">🏪</span><span class="label">商家</span>
    </div>
    <div class="tabbar-item" data-tab="profile" onclick="switchTab('profile')">
      <span class="icon">👤</span><span class="label">我的</span>
    </div>
  </div>
</div>

<script>
(function() {
  // ===== 判断是否为 PWA 模式 =====
  const isPWA = window.matchMedia('(display-mode: standalone)').matches ||
                window.navigator.standalone === true ||
                window.name === 'pwa-standalone'

  if (isPWA) {
    // PWA 模式：显示带Tab栏的统一壳
    document.getElementById('pwaApp').classList.add('active')
  } else {
    // 浏览器模式：直接跳转到商城首页(h5)
    // 但如果URL已经包含 /profile/ 或 /www/, 则留在壳里处理
    const path = window.location.pathname
    if (path.startsWith('/profile/') || path.startsWith('/www/')) {
      document.getElementById('pwaApp').classList.add('active')
    } else {
      window.location.replace('/wap/')
    }
  }
})()

// ===== Tab 切换逻辑 =====
const TAB_URLS = { shop: '/wap/', merchant: '/www/' }
const iframe = document.getElementById('appFrame')
const profilePage = document.getElementById('profilePage')

function switchTab(tab) {
  document.querySelectorAll('.tabbar-item').forEach(el => el.classList.toggle('active', el.dataset.tab === tab))

  if (tab === 'profile') {
    iframe.style.display = 'none'
    profilePage.classList.add('active')
    updateProfile()
  } else {
    profilePage.classList.remove('active')
    iframe.style.display = 'block'
    // 只切换第一次，保留iframe历史
    const currentSrc = iframe.src
    if (!currentSrc || !currentSrc.includes(TAB_URLS[tab])) {
      iframe.src = TAB_URLS[tab]
    }
  }
}

// 点击个人中心菜单项
document.querySelectorAll('.menu-item').forEach(el => {
  el.addEventListener('click', function() {
    const url = this.dataset.url
    iframe.style.display = 'block'
    profilePage.classList.remove('active')
    iframe.src = url
    // 切换到对应tab
    if (url === '/wap/') switchTab('shop')
    else if (url === '/www/') switchTab('merchant')
  })
})

function updateProfile() {
  const token = localStorage.getItem('token')
  const userInfo = JSON.parse(localStorage.getItem('userInfo') || '{}')
  const role = localStorage.getItem('role') || 'customer'
  document.getElementById('displayName').textContent = userInfo.nickname || userInfo.username || (token ? '已登录' : '游客')
  document.getElementById('displayRole').textContent = role === 'merchant' ? '商家用户' : '普通用户'
}

function clearCache() {
  localStorage.clear()
  updateProfile()
  alert('缓存已清除')
}
</script>
</body>
</html>
