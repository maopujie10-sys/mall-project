<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TikTokMall" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
  <title>TikTokMall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system,"Helvetica Neue",sans-serif; background: #080b1a; }
    #app { display: flex; flex-direction: column; height: 100%; }
    #content { flex: 1; overflow-y: auto; position: relative; }
    
    /* 落地页内容 */
    .landing { padding: 40px 20px 20px; text-align: center; color: #fff; min-height: 100%; }
    .landing .logo { font-size: 48px; margin-bottom: 8px; }
    .landing h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .landing .sub { font-size: 13px; color: rgba(255,255,255,0.45); margin-bottom: 28px; }
    .landing .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 360px; margin: 0 auto 20px; }
    .landing .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 18px 14px; cursor: pointer; transition: all .2s; text-align: center; }
    .landing .card:hover { background: rgba(102,126,234,0.1); border-color: rgba(102,126,234,0.3); }
    .landing .card .icon { font-size: 28px; margin-bottom: 6px; }
    .landing .card .title { font-size: 14px; font-weight: 600; }
    .landing .card .desc { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .landing .btn-primary { display: block; width: 100%; max-width: 360px; margin: 8px auto; padding: 14px; background: linear-gradient(135deg,#667eea,#764ba2); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 1px; }
    
    /* 商家/商城 iframe */
    .iframe-view { display: none; height: 100%; }
    .iframe-view.active { display: block; }
    .iframe-view iframe { width: 100%; height: 100%; border: none; background: #fff; }

    /* 底部导航 */
    .tabbar { display: flex; background: rgba(10,10,10,0.95); border-top: 1px solid rgba(255,255,255,0.06); padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; z-index: 999; }
    .tabbar-item { flex: 1; text-align: center; padding: 8px 0 4px; color: rgba(255,255,255,0.45); font-size: 10px; cursor: pointer; transition: color .2s; -webkit-tap-highlight-color: transparent; }
    .tabbar-item.active { color: #667eea; }
    .tabbar-item .icon { font-size: 20px; display: block; margin-bottom: 2px; }
    .tabbar-item .label { font-size: 10px; }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'))
    }
  </script>
</head>
<body>
<div id="app">
  <div id="content">
    <!-- Tab: 首页(落地页) -->
    <div id="tab-home" class="landing" style="display:block">
      <div class="logo">&#x1F310;</div>
      <h1>TikTokMall</h1>
      <p class="sub">全球批发商城</p>
      <div class="card-grid">
        <div class="card" onclick="goTo('/home')"><div class="icon">&#x1F6D2;</div><div class="title">买家商城</div><div class="desc">海量商品</div></div>
        <div class="card" onclick="goTo('/seller/')"><div class="icon">&#x1F3EA;</div><div class="title">卖家中心</div><div class="desc">一键开店</div></div>
        <div class="card" onclick="goTo('/partner')"><div class="icon">&#x1F91D;</div><div class="title">合作伙伴</div><div class="desc">共享增长</div></div>
        <div class="card" onclick="goTo('/seller/')"><div class="icon">&#x2699;</div><div class="title">后台管理</div><div class="desc">数据看板</div></div>
      </div>
      <button class="btn-primary" onclick="goTo('/home')">&#x1F680; 进入商城</button>
      <button class="btn-primary" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);margin-top:6px" onclick="goTo('/seller/')">&#x1F4E6; 商家入驻</button>
    </div>

    <!-- Tab: 商城 -->
    <div id="tab-shop" class="iframe-view"><iframe id="frame-shop" src="about:blank"></iframe></div>
    <!-- Tab: 商家 -->
    <div id="tab-merchant" class="iframe-view"><iframe id="frame-merchant" src="about:blank"></iframe></div>
    <!-- Tab: 我的 -->
    <div id="tab-me" style="display:none;padding:30px 20px;color:#fff;text-align:center;min-height:100%">
      <div style="font-size:48px;margin-bottom:12px">&#x1F464;</div>
      <h3 id="me-name" style="margin-bottom:4px">游客</h3>
      <p style="color:rgba(255,255,255,0.4);font-size:13px;margin-bottom:20px" id="me-role">普通用户</p>
      <button class="btn-primary" onclick="goTo('/login')" style="margin-bottom:8px">&#x1F511; 登录</button>
      <button class="btn-primary" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1)" onclick="goTo('/merchantSettled')">&#x1F4CB; 申请入驻</button>
      <button style="margin-top:20px;padding:10px 24px;background:none;border:1px solid rgba(255,77,79,0.3);color:#ff4d4f;border-radius:8px;font-size:13px;cursor:pointer" onclick="localStorage.clear();location.reload()">清除缓存</button>
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="tabbar" id="tabbar">
    <div class="tabbar-item active" data-tab="home" onclick="switchTab('home')"><span class="icon">&#x1F3E0;</span><span class="label">首页</span></div>
    <div class="tabbar-item" data-tab="shop" onclick="switchTab('shop')"><span class="icon">&#x1F6CD;</span><span class="label">商城</span></div>
    <div class="tabbar-item" data-tab="merchant" onclick="switchTab('merchant')"><span class="icon">&#x1F3EC;</span><span class="label">商家</span></div>
    <div class="tabbar-item" data-tab="me" onclick="switchTab('me')"><span class="icon">&#x1F464;</span><span class="label">我的</span></div>
  </div>
</div>

<script>
// 使用当前域名（移除DMCA风险域名轮换）
var currentTab = 'home';
var loadedTabs = {};

window.goTo = function(path) {
  switchTabByPath(path);
};

function pickHost() {
  return window.location.hostname;
}

function switchTabByPath(path) {
  if (path==='/home' || !path) switchTab('shop');
  else if (path==='/seller/' || path==='/merchantSettled') switchTab('merchant');
  else if (path==='/login') switchTab('me');
  else switchTab('shop');
}
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tabbar-item').forEach(function(el){el.classList.toggle('active',el.dataset.tab===tab)});
  document.getElementById('tab-home').style.display = tab==='home'?'block':'none';
  document.getElementById('tab-shop').classList.toggle('active', tab==='shop');
  document.getElementById('tab-merchant').classList.toggle('active', tab==='merchant');
  document.getElementById('tab-me').style.display = tab==='me'?'block':'none';
  
  // 首次切换到商城/商家才加载iframe
  if (tab==='shop' && !loadedTabs.shop) { loadedTabs.shop=true; document.getElementById('frame-shop').src='https://'+pickHost()+'/wap/'; }
  if (tab==='merchant' && !loadedTabs.merchant) { loadedTabs.merchant=true; document.getElementById('frame-merchant').src='https://'+pickHost()+'/www/'; }
  if (tab==='me') updateMe();
}

function updateMe() {
  var token = localStorage.getItem('token');
  var info = JSON.parse(localStorage.getItem('userInfo')||'{}');
  document.getElementById('me-name').textContent = info.nickname || info.username || (token?'已登录':'游客');
  document.getElementById('me-role').textContent = localStorage.getItem('role')==='merchant'?'商家用户':'普通用户';
}

// 初始加载
updateMe();
</script>
</body>
</html>
