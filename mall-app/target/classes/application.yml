agent:
  token: ${AGENT_TOKEN:}

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:3306/malldb?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

cos:
  secret-id: ${COS_SECRET_ID:}
  secret-key: ${COS_SECRET_KEY:}
  bucketName: ${COS_BUCKET:wangzhen-1435149418}
  region: ${COS_REGION:ap-singapore}
  domain: ${COS_DOMAIN:}

upload:
  path: ${UPLOAD_PATH:/home/data/uploads}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_uuid
      table-prefix: ''

logging:
  level:
    com.mall: info
