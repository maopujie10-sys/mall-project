<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTokMall</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #080b1a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; text-align: center;
  }
  .loader { animation: spin 1s linear infinite; width: 40px; height: 40px;
    border: 3px solid rgba(102,126,234,0.2); border-top-color: #667eea;
    border-radius: 50%; margin: 0 auto 20px; display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 10px; }
  .error { color: #ff4d4f; margin-top: 20px; font-size: 13px; display: none; }
  .btns { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
  .btn { display: block; width: 100%; max-width: 300px; margin: 0 auto; padding: 14px 24px;
    border: 1px solid rgba(102,126,234,0.3); border-radius: 10px;
    background: rgba(102,126,234,0.08); color: #fff; font-size: 16px;
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px; }
  .btn:hover { background: rgba(102,126,234,0.18); border-color: #667eea; }
  .btn.primary { background: linear-gradient(135deg,#667eea,#764ba2); border: none; font-weight: 600; }
  .btn:disabled { opacity: 0.5; pointer-events: none; }
  .retry { margin-top: 16px; padding: 8px 24px; border: 1px solid #667eea;
    color: #667eea; background: transparent; border-radius: 6px; cursor: pointer;
    font-size: 13px; display: none; }
</style>
</head>
<body>
<div>
  <div class="loader" id="loader"></div>
  <div id="msg">TikTokMall 全球批发商城</div>
  <div class="status" id="detail"></div>
  <div class="error" id="err"></div>
  <div class="btns" id="btns">
    <button class="btn primary" onclick="doJump('/home')">进入商城</button>
    <button class="btn" onclick="doJump('/login')">用户登录</button>
    <button class="btn" onclick="doJump('/merchantSettled')">商家入驻</button>
  </div>
  <button class="retry" id="retryBtn" onclick="location.reload()">重新尝试</button>
</div>

<script>
const CONFIG_URL = './domain-config.json';
const STORAGE_KEY = 'landing_rotation';
const DEAD_TTL = 10 * 60 * 1000;

let config = null;
let state = null;

function loadState() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { deadDomains: {}, groupIndex: 0, childIndex: {} };
  } catch(e) { return { deadDomains: {}, groupIndex: 0, childIndex: {} }; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function isGroupAlive(group) {
  if (!group.enabled) return false;
  var dead = state.deadDomains[group.main];
  if (!dead) return true;
  if (Date.now() - dead.time > DEAD_TTL) {
    delete state.deadDomains[group.main];
    saveState();
    return true;
  }
  return false;
}

function isChildAlive(child) {
  var dead = state.deadDomains[child];
  if (!dead) return true;
  if (Date.now() - dead.time > DEAD_TTL) {
    delete state.deadDomains[child];
    saveState();
    return true;
  }
  return false;
}

function pickGroup() {
  var groups = config.groups;
  var startIdx = state.groupIndex % groups.length;
  for (var i = 0; i < groups.length; i++) {
    var idx = (startIdx + i) % groups.length;
    var g = groups[idx];
    var aliveChildren = g.children.filter(function(c) { return isChildAlive(c); });
    if (isGroupAlive(g) && aliveChildren.length > 0) {
      state.groupIndex = idx;
      saveState();
      return { group: g, children: aliveChildren };
    }
  }
  return null;
}

function pickChild(group) {
  var children = group.children;
  if (!state.childIndex[group.main]) state.childIndex[group.main] = 0;
  var startIdx = state.childIndex[group.main] % children.length;
  for (var i = 0; i < children.length; i++) {
    var idx = (startIdx + i) % children.length;
    var child = children[idx];
    if (isChildAlive(child)) {
      state.childIndex[group.main] = (idx + 1) % children.length;
      saveState();
      return child;
    }
  }
  return null;
}

function markDead(domain) {
  state.deadDomains[domain] = { time: Date.now(), reason: '连接失败' };
  saveState();
}

function healthCheck(url) {
  return new Promise(function(resolve) {
    var img = new Image();
    var t = setTimeout(function() { img.src = ''; resolve(false); }, 5000);
    img.onload = function() { clearTimeout(t); resolve(true); };
    img.onerror = function() { clearTimeout(t); resolve(false); };
    img.src = url + '/favicon.ico?' + Date.now();
  });
}

function showError(msg) {
  document.getElementById('err').style.display = 'block';
  document.getElementById('err').textContent = msg;
  document.getElementById('retryBtn').style.display = 'inline-block';
  document.getElementById('loader').style.display = 'none';
  document.getElementById('btns').style.display = 'flex';
  document.getElementById('msg').textContent = '跳转失败';
}

function showLoading() {
  document.getElementById('loader').style.display = 'block';
  document.getElementById('btns').style.display = 'none';
  document.getElementById('msg').textContent = '正在选择最优线路...';
  document.getElementById('err').style.display = 'none';
  document.getElementById('retryBtn').style.display = 'none';
}

window.doJump = async function(targetPath) {
  targetPath = targetPath || '/home';
  state = loadState();
  showLoading();

  if (!config) {
    try {
      var r = await fetch(CONFIG_URL);
      config = await r.json();
    } catch(e) {
      showError('配置加载失败');
      return;
    }
  }

  var pick = pickGroup();
  if (!pick) {
    showError('所有域名组暂不可用');
    return;
  }

  document.getElementById('detail').textContent = '主域名组: ' + pick.group.main;

  var child = pickChild(pick);
  if (!child) {
    markDead(pick.group.main);
    return doJump(targetPath);
  }

  var targetUrl = 'https://' + child + targetPath;
  document.getElementById('detail').textContent = '主域名组: ' + pick.group.main + ' → ' + child;

  var alive = await healthCheck(targetUrl);
  if (!alive) {
    markDead(child);
    var aliveChildren = pick.group.children.filter(function(c) { return isChildAlive(c); });
    if (aliveChildren.length === 0) markDead(pick.group.main);
    return doJump(targetPath);
  }

  document.getElementById('msg').textContent = '线路就绪，正在跳转...';
  setTimeout(function() { window.location.href = targetUrl; }, 300);
};
</script>
</body>
</html>
