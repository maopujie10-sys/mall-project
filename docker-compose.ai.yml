version: "3.8"

# ============================================================
# AI 面板部署 — 只加两个容器，复用现有 MySQL/Redis/Nginx/Tomcat
# ============================================================

services:
  ai-agent:
    build: ./backend
    container_name: mall-ai-agent
    network_mode: host
    env_file: .env
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
        healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      retries: 3
    restart: unless-stopped

  ai-frontend:
    build: ./frontend
    container_name: mall-ai-frontend
    ports:
      - "5173:80"
        healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      retries: 3
    restart: unless-stopped
