<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.svg" sizes="192x192">
<link rel="apple-touch-icon" href="icons/icon-192.svg">
<title>TikTokMall</title>
<style>
  :root{--bg:#080b1a;--primary:#667eea;--text:rgba(255,255,255,.87);--muted:rgba(255,255,255,.45)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px;-webkit-font-smoothing:antialiased}
  .splash{text-align:center;max-width:400px;width:100%}
  .logo{width:72px;height:72px;margin:0 auto 20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#fff;box-shadow:0 8px 32px rgba(102,126,234,.3)}
  .spinner{width:32px;height:32px;margin:24px auto;border:3px solid rgba(102,126,234,.15);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:20px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:var(--muted);margin-bottom:16px}
  .step{font-size:12px;color:var(--muted);padding:4px 0;opacity:.5;transition:opacity .3s}
  .step.active{opacity:1;color:var(--primary)}
  .step.done{opacity:.7;color:#52c41a}
  .step.fail{opacity:1;color:#ff4d4f}
  .offline{display:none;margin-top:24px;padding:16px;background:rgba(255,77,79,.1);border:1px solid rgba(255,77,79,.2);border-radius:12px;font-size:13px;color:#ff4d4f}
  .retry-btn{margin-top:16px;padding:10px 28px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
  .version{position:fixed;bottom:12px;font-size:10px;color:rgba(255,255,255,.12)}
</style>
</head>
<body>
<div class="splash">
  <div class="logo">TM</div>
  <h1>TikTokMall</h1>
  <p class="sub"></p>
  <div class="spinner" id="spinner"></div>
  <div id="steps">
    <div class="step active" data-step="config"></div>
    <div class="step" data-step="group"></div>
    <div class="step" data-step="child"></div>
    <div class="step" data-step="probe"></div>
    <div class="step" data-step="redirect"></div>
  </div>
  <div class="offline" id="offline">
    
    <br><button class="retry-btn" onclick="location.reload()"></button>
  </div>
  <div class="version">PWA v1.0</div>
</div>

<script>
//  Service Worker
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js");
  });
}

// 
window.addEventListener("offline", () => {
  document.getElementById("offline").style.display = "block";
});
window.addEventListener("online", () => {
  document.getElementById("offline").style.display = "none";
});

// 
(function(){
var s = document.createElement("script");
s.src = "../rotation-engine.js";
s.onload = function() {
  // 
  console.log("[PWA] rotation-engine loaded");
};
s.onerror = function() {
  document.getElementById("spinner").style.display = "none";
  document.getElementById("offline").style.display = "block";
};
document.body.appendChild(s);
})();
</script>
</body>
</html>
