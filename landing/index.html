<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Loading...</title>
<!-- 预连接 Top 3 主域名组 -->
<link rel="dns-prefetch" href="//tiktook.eu.cc">
<link rel="dns-prefetch" href="//tiktokmall.shop">
<link rel="dns-prefetch" href="//tiktokmall.store">
<link rel="preconnect" href="//tiktook.eu.cc" crossorigin>
<style>
  :root { --bg:#080b1a; --primary:#667eea; --text:rgba(255,255,255,0.87); --muted:rgba(255,255,255,0.45); }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  .container{text-align:center;max-width:420px}
  .spinner{width:44px;height:44px;margin:0 auto 24px;position:relative}
  .spinner::before,.spinner::after{content:'';position:absolute;border-radius:50%}
  .spinner::before{inset:0;border:3px solid rgba(102,126,234,.15);border-top-color:var(--primary);animation:spin .8s linear infinite}
  .spinner::after{inset:8px;border:2px solid rgba(102,126,234,.1);border-bottom-color:rgba(118,75,162,.6);animation:spin 1.2s linear infinite reverse}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:18px;font-weight:600;margin-bottom:8px;letter-spacing:.5px}
  .steps{font-size:12px;color:var(--muted);line-height:1.8}
  .step{display:flex;align-items:center;justify-content:center;gap:6px;opacity:.5;transition:opacity .3s}
  .step.active{opacity:1;color:var(--primary)}
  .step.done{opacity:.7;color:#52c41a}
  .step.fail{opacity:1;color:#ff4d4f}
  .step-icon{font-size:14px;width:18px}
  .fallback{display:none;margin-top:32px;padding-top:24px;border-top:1px solid rgba(255,255,255,.06)}
  .fallback a{display:block;padding:10px 16px;margin:6px 0;border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--text);text-decoration:none;font-size:13px;transition:all .15s}
  .fallback a:hover{border-color:var(--primary);background:rgba(102,126,234,.08)}
  .timer{font-size:11px;color:var(--muted);margin-top:16px}
  .debug{display:none;margin-top:12px;font-size:10px;color:rgba(255,255,255,.2);text-align:left;max-height:120px;overflow-y:auto}
  .report-btn{display:none;margin-top:8px;font-size:11px;color:var(--primary);cursor:pointer;background:none;border:none}
</style>
</head>
<body>
<div class="container">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">正在连接最优线路</h1>
  <div class="steps" id="steps">
    <div class="step active" data-step="config"><span class="step-icon">&#x25CF;</span>加载配置</div>
    <div class="step" data-step="group"><span class="step-icon">&#x25CB;</span>选择主域名组</div>
    <div class="step" data-step="child"><span class="step-icon">&#x25CB;</span>分配子域名</div>
    <div class="step" data-step="probe"><span class="step-icon">&#x25CB;</span>健康检测</div>
    <div class="step" data-step="redirect"><span class="step-icon">&#x25CB;</span>跳转目标</div>
  </div>
  <div class="timer" id="timer"></div>
  <div class="fallback" id="fallback"></div>
  <button class="report-btn" id="reportBtn" onclick="toggleDebug()">诊断信息</button>
  <div class="debug" id="debug"></div>
</div>
<script src="./rotation-engine.js"></script>
</body>
</html>
