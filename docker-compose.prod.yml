version: "3.8"

services:
  agent:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: mall-agent
    ports:
      - "9000:9000"
    env_file: .env
    environment:
      - APP_ENV=production
    volumes:
      - ./backups:/app/backups
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /usr/bin/docker:/usr/bin/docker:ro
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: mall-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --save 300 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: mall-agent-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - agent
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
